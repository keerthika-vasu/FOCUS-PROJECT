# =============================================================================
#  🛡️  FOCUS-SHIELD — E2E Appium Test Workflow
#  Framework: Python + pytest + Appium + UIAutomator2 (Flutter on Android)
#
#  Gate Rules (hard failures):
#    ① Any test case fails              → workflow fails
#    ② Total executed tests  < 300      → workflow fails
#    ③ Any screen has        < 10 tests → workflow fails
#
#  Summary: Richly-formatted Markdown written to $GITHUB_STEP_SUMMARY
# =============================================================================

name: 🛡️ FOCUS-SHIELD E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (generates mock results, no emulator needed)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

# Cancel stale runs on the same branch/PR to preserve quota minutes
concurrency:
  group: focus-shield-e2e-${{ github.ref }}
  cancel-in-progress: true

# ── Thresholds — change these in ONE place ────────────────────────────────────
env:
  TOTAL_THRESHOLD: 300          # Minimum total test cases that must pass
  PER_SCREEN_THRESHOLD: 10      # Minimum test cases per screen
  JUNIT_REPORT: appium_tests/reports/junit.xml
  APPIUM_SERVER: "http://localhost:4723"
  APP_PATH: "build/app/outputs/flutter-apk/app-debug.apk"
  DEVICE_NAME: "Android Emulator"
  PLATFORM_VERSION: "10.0"

jobs:
  e2e:
    name: "E2E Suite — Flutter/Appium/Android"
    runs-on: ubuntu-latest       # KVM-capable; 1:1 concurrency quota

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Enable KVM for Android Emulator ───────────────────────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 3. Java (needed by Android SDK / emulator) ───────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      # ── 4. Flutter SDK ────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ── 5. Build debug APK ────────────────────────────────────────────────────
      - name: Build Flutter debug APK
        run: |
          if [ -f pubspec.yaml ]; then
            echo "pubspec.yaml found — building debug APK..."
            flutter pub get
            flutter build apk --debug
          else
            echo "WARNING: pubspec.yaml not found in $(pwd). Creating a placeholder APK."
            mkdir -p build/app/outputs/flutter-apk/
            touch build/app/outputs/flutter-apk/app-debug.apk
          fi

      # ── 6. Appium + UIAutomator2 ──────────────────────────────────────────────
      - name: Set up Node.js (Appium dependency)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium & UIAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      # ── 7. Python + test dependencies ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r appium_tests/requirements.txt
          # pytest-junit for JUnit XML output
          pip install pytest-junit

      # ── 8. Prepare report directories ────────────────────────────────────────
      - name: Create report directories
        run: |
          mkdir -p appium_tests/reports/screenshots
          mkdir -p appium_tests/reports/json

      # ── 9. Start Appium server ────────────────────────────────────────────────
      - name: Start Appium server
        run: |
          appium --log appium_tests/reports/appium-server.log &
          # Give Appium a moment to initialise before tests run
          sleep 5

      # ── 10. RUN E2E TESTS ──────────────────────────────────────────────────────
      #  The step runs inside the Android emulator action.
      #  continue-on-error: true  ← we own the gate logic; don't let pytest's
      #  exit code short-circuit the Summary + upload steps.
      - name: Run FOCUS-SHIELD E2E Tests
        id: run_tests
        continue-on-error: true
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          emulator-options: >-
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # ── FOCUS-SHIELD: run all test_*.py files under appium_tests/ ──────
            #
            # pytest classnames  →  used as "screen" in the summary.
            # Convention already used in your test suite:
            #   class TestLoginScreen:   ...   (maps to "LoginScreen")
            #   class TestSignupScreen:  ...   (maps to "SignupScreen")
            # etc.
            #
            # Add --junit-xml so the summary parser has structured data.
            python -m pytest appium_tests/ \
              --junit-xml=appium_tests/reports/junit.xml \
              -v \
              --tb=short \
              2>&1 | tee appium_tests/reports/pytest-output.txt
            echo "pytest_exit=$?" >> "$GITHUB_OUTPUT"

      # ── 11. Parse results + write GitHub Step Summary ─────────────────────────
      - name: 📊 Parse results & write Step Summary
        if: always()
        id: summarise
        shell: python
        run: |
          import os, sys, xml.etree.ElementTree as ET
          from pathlib import Path
          from datetime import datetime, timezone

          # ── Config ─────────────────────────────────────────────────────────────
          JUNIT       = os.environ.get("JUNIT_REPORT", "appium_tests/reports/junit.xml")
          SUMMARY     = os.environ.get("GITHUB_STEP_SUMMARY", "")
          OUT         = os.environ.get("GITHUB_OUTPUT", "")
          TOTAL_MIN   = int(os.environ.get("TOTAL_THRESHOLD", 300))
          SCREEN_MIN  = int(os.environ.get("PER_SCREEN_THRESHOLD", 10))
          REPO        = os.environ.get("GITHUB_REPOSITORY", "FOCUS-SHIELD")
          RUN_ID      = os.environ.get("GITHUB_RUN_ID", "")
          BRANCH      = os.environ.get("GITHUB_REF_NAME", "unknown")
          SHA         = os.environ.get("GITHUB_SHA", "unknown")[:7]
          NOW         = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          RUN_URL     = f"https://github.com/{REPO}/actions/runs/{RUN_ID}"

          # ── Known screens (derived from actual source files in this repo) ──────
          # Used to detect screens that have ZERO test files at all.
          KNOWN_SCREENS = {
            # Auth
            "LoginScreen", "SignupScreen", "SplashScreen",
            # Student
            "StudentHomeScreen", "FocusModeScreen", "McqTestScreen",
            "RewardsScreen", "ProfileSettingsScreen",
            "StudentNotesScreen", "StudentProfileScreen",
            # Teacher
            "TeacherHomeScreen", "AnalyticsScreen", "CreateTestScreen",
            "AssignHomeworkScreen", "MotivationScreen", "TeacherNotesScreen",
            # Parent
            "ParentHomeScreen",
            # Shared
            "ActivityLogScreen",
          }

          # ── Parse JUnit XML ────────────────────────────────────────────────────
          def parse_junit(path):
              """
              Returns dict:  screen_name → {total, passed, failed, skipped, errors:[]}
              and grand totals.
              """
              screens = {}
              grand = dict(total=0, passed=0, failed=0, skipped=0)

              if not Path(path).exists():
                  return screens, grand, False   # (screens, grand, xml_found)

              tree = ET.parse(path)
              root = tree.getroot()
              suites = (list(root.iter("testsuite"))
                        if root.tag == "testsuites"
                        else [root] if root.tag == "testsuite"
                        else list(root.iter("testsuite")))

              for suite in suites:
                  for tc in suite.iter("testcase"):
                      # classname is "module::ClassName" or just "ClassName"
                      raw = tc.get("classname", "")
                      # Take last dot-segment → mirrors Python class name
                      screen = raw.split(".")[-1] or suite.get("name", "Unknown")

                      if screen not in screens:
                          screens[screen] = dict(total=0, passed=0,
                                                  failed=0, skipped=0, errors=[])

                      screens[screen]["total"] += 1
                      grand["total"] += 1

                      fail_el = tc.find("failure") or tc.find("error")
                      skip_el = tc.find("skipped")

                      if fail_el is not None:
                          screens[screen]["failed"] += 1
                          grand["failed"] += 1
                          msg = fail_el.get("message", "")[:160]
                          screens[screen]["errors"].append(
                              f"- `{tc.get('name','')}`: {msg}")
                      elif skip_el is not None:
                          screens[screen]["skipped"] += 1
                          grand["skipped"] += 1
                      else:
                          screens[screen]["passed"] += 1
                          grand["passed"] += 1

              return screens, grand, True

          screens, grand, xml_found = parse_junit(JUNIT)

          # ── Inject known screens missing from XML (0 tests counted) ───────────
          for s in KNOWN_SCREENS:
              if s not in screens:
                  screens[s] = dict(total=0, passed=0, failed=0, skipped=0, errors=[])

          # ── Gate evaluation ────────────────────────────────────────────────────
          fails = []
          if not xml_found:
              fails.append("JUnit XML report was not generated — tests may not have run")
          if grand["failed"] > 0:
              fails.append(f"{grand['failed']} test case(s) FAILED")
          if grand["total"] < TOTAL_MIN:
              fails.append(
                  f"Only **{grand['total']}** tests executed — "
                  f"minimum required is **{TOTAL_MIN}**")

          low_screens = {s: d for s, d in screens.items()
                         if d["total"] < SCREEN_MIN}
          if low_screens:
              fails.append(
                  f"{len(low_screens)} screen(s) below the {SCREEN_MIN}-test minimum")

          gate_fail = bool(fails)

          # Write outputs for the gate step
          if OUT:
              with open(OUT, "a") as fh:
                  fh.write(f"gate_fail={'true' if gate_fail else 'false'}\n")
                  fh.write(f"grand_total={grand['total']}\n")
                  fh.write(f"grand_failed={grand['failed']}\n")
                  fh.write("fail_reasons=" +
                            "|".join(fails).replace("\n","") + "\n")

          # ── Build Markdown ─────────────────────────────────────────────────────
          overall = "🔴 FAILED" if gate_fail else "🟢 PASSED"
          threshold_hit = (f"✅ YES — `{grand['total']}` tests run"
                           if grand["total"] >= TOTAL_MIN
                           else f"❌ NO — only `{grand['total']}` of `{TOTAL_MIN}` required")
          pass_rate = (f"{grand['passed']/grand['total']*100:.1f}%"
                       if grand["total"] > 0 else "N/A")

          md = []

          # ── Header ────────────────────────────────────────────────────────────
          md += [
            f"# 🛡️ FOCUS-SHIELD E2E Testing Summary",
            f"",
            f"> **Status:** {overall} &nbsp;·&nbsp; "
            f"🌿 `{BRANCH}` &nbsp;·&nbsp; "
            f"📦 `{SHA}` &nbsp;·&nbsp; "
            f"🕐 {NOW}",
            f"",
          ]

          # ── Caution block if gates failed ─────────────────────────────────────
          if gate_fail:
              md += ["> [!CAUTION]",
                     "> **Build blocked — the following gate(s) failed:**"]
              for r in fails:
                  md.append(f"> - {r}")
              md.append("")

          # ── Section 1: Status Badge / Totals ──────────────────────────────────
          md += [
            "## 📊 Test Execution Summary",
            "",
            "| Metric | Value |",
            "|--------|-------|",
            f"| 🎯 **Target (≥{TOTAL_MIN} tests)** | {threshold_hit} |",
            f"| 📋 Total Tests Executed | `{grand['total']}` |",
            f"| ✅ Passed | `{grand['passed']}` |",
            f"| ❌ Failed | `{grand['failed']}` |",
            f"| ⏭️ Skipped | `{grand['skipped']}` |",
            f"| 📈 Pass Rate | `{pass_rate}` |",
            f"| 🖼️ Screens Tested | `{len([s for s,d in screens.items() if d['total']>0])}` / `{len(screens)}` |",
            "",
          ]

          # ── Section 2: Per-suite breakdown ────────────────────────────────────
          md += [
            "## 🗂️ Per-Suite Results",
            "",
            "| # | Screen / Suite | Total | ✅ Pass | ❌ Fail | ⏭️ Skip | Result |",
            "|---|----------------|------:|-------:|-------:|-------:|--------|",
          ]
          for idx, (screen, d) in enumerate(sorted(screens.items()), 1):
              if d["failed"] > 0:     icon = "🔴 FAIL"
              elif d["total"] == 0:   icon = "⚪ NO TESTS"
              elif d["skipped"] > 0:  icon = "🟡 PARTIAL"
              else:                   icon = "🟢 PASS"
              md.append(
                  f"| {idx} | `{screen}` | {d['total']} "
                  f"| {d['passed']} | {d['failed']} | {d['skipped']} | {icon} |")
          md.append("")

          # Collapsible failure details
          failed_screens = {s: d for s, d in screens.items() if d["failed"] > 0}
          if failed_screens:
              md += ["<details>",
                     "<summary>🔍 Failure Details (click to expand)</summary>",
                     ""]
              for screen, d in failed_screens.items():
                  md.append(f"### `{screen}` — {d['failed']} failure(s)")
                  for err in d["errors"]:
                      md.append(err)
                  md.append("")
              md += ["</details>", ""]

          # ── Section 3: Screen Coverage Check ─────────────────────────────────
          all_covered = all(d["total"] >= SCREEN_MIN for d in screens.values())
          coverage_status = "✅ ALL SCREENS MET MINIMUM" if all_covered else "❌ SOME SCREENS BELOW MINIMUM"

          md += [
            f"## 🎯 Screen Coverage Check &nbsp; {coverage_status}",
            f"",
            f"> Each screen must have **≥ {SCREEN_MIN} test cases** generated and executed.",
            f"",
            "| Screen | Role | Tests Run | Progress | Status |",
            "|--------|------|----------:|----------|--------|",
          ]

          ROLE_MAP = {
            "LoginScreen":          "Auth",
            "SignupScreen":         "Auth",
            "SplashScreen":         "Auth",
            "StudentHomeScreen":    "Student",
            "FocusModeScreen":      "Student",
            "McqTestScreen":        "Student",
            "RewardsScreen":        "Student",
            "ProfileSettingsScreen":"Student",
            "StudentNotesScreen":   "Student",
            "StudentProfileScreen": "Student",
            "TeacherHomeScreen":    "Teacher",
            "AnalyticsScreen":      "Teacher",
            "CreateTestScreen":     "Teacher",
            "AssignHomeworkScreen": "Teacher",
            "MotivationScreen":     "Teacher",
            "TeacherNotesScreen":   "Teacher",
            "ParentHomeScreen":     "Parent",
            "ActivityLogScreen":    "Shared",
          }

          for screen, d in sorted(screens.items()):
              count = d["total"]
              ok    = count >= SCREEN_MIN
              role  = ROLE_MAP.get(screen, "Unknown")
              filled = min(count, SCREEN_MIN)
              bar    = "█" * filled + "░" * max(0, SCREEN_MIN - filled)
              status = f"✅ PASS ({count}/{SCREEN_MIN})" if ok \
                       else f"❌ FAIL — {SCREEN_MIN-count} more needed"
              md.append(f"| `{screen}` | {role} | {count} | `{bar}` | {status} |")

          md.append("")

          # Low-coverage warning box
          if low_screens:
              md += ["> [!WARNING]",
                     f"> **{len(low_screens)} screen(s)** are below the "
                     f"minimum of **{SCREEN_MIN}** tests:"]
              for s, d in sorted(low_screens.items()):
                  md.append(f"> - `{s}` has **{d['total']}** test(s) "
                             f"(needs {SCREEN_MIN - d['total']} more)")
              md.append("")

          # ── Final success message ─────────────────────────────────────────────
          if not gate_fail:
              md += [
                "> [!NOTE]",
                f"> 🎉 **All {grand['total']} test cases passed.** "
                "Every screen meets the 10-test minimum. Build is clean!",
                "",
              ]

          # ── Footer ────────────────────────────────────────────────────────────
          md += [
            "---",
            f"*Generated by [GitHub Actions]({RUN_URL}) &nbsp;·&nbsp; "
            f"FOCUS-SHIELD E2E Suite &nbsp;·&nbsp; "
            f"Thresholds: ≥{TOTAL_MIN} total · ≥{SCREEN_MIN} per screen*",
          ]

          # ── Write to $GITHUB_STEP_SUMMARY ─────────────────────────────────────
          content = "\n".join(md) + "\n"
          if SUMMARY:
              with open(SUMMARY, "a", encoding="utf-8") as f:
                  f.write(content)
              print("✅  Step summary written.")
          else:
              print(content)   # fallback: print to log

      # ── 12. STRICT GATE — owns the final exit code ────────────────────────────
      - name: 🚦 Strict Pass / Fail Gate
        if: always()
        run: |
          GATE="${{ steps.summarise.outputs.gate_fail }}"
          TOTAL="${{ steps.summarise.outputs.grand_total }}"
          FAILED="${{ steps.summarise.outputs.grand_failed }}"
          REASONS="${{ steps.summarise.outputs.fail_reasons }}"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🛡️  FOCUS-SHIELD — E2E Gate Evaluation"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Tests executed : ${TOTAL}"
          echo "  Tests failed   : ${FAILED}"
          echo "  Required total : ${{ env.TOTAL_THRESHOLD }}"
          echo "  Per-screen min : ${{ env.PER_SCREEN_THRESHOLD }}"
          echo "  Gate result    : ${GATE}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "${GATE}" = "true" ]; then
            echo ""
            echo "❌  BUILD FAILED — gate violation(s) detected:"
            IFS='|' read -ra RS <<< "${REASONS}"
            for R in "${RS[@]}"; do
              echo "   • ${R}"
            done
            echo ""
            exit 1
          fi

          echo "✅  All gates passed — build is green."

      # ── 13. Upload raw artifacts (always, for forensic debugging) ─────────────
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: focus-shield-e2e-${{ github.run_number }}-${{ github.sha }}
          path: |
            appium_tests/reports/
          retention-days: 14
          if-no-files-found: warn
