name: Android E2E Appium Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  appium-test:
    runs-on: macos-13 # macos runners support hardware acceleration for Android Emulators
    
    env:
      APPIUM_SERVER: "http://localhost:4723"
      APP_PATH: "build/app/outputs/flutter-apk/app-debug.apk"
      DEVICE_NAME: "Android Emulator"
      PLATFORM_VERSION: "10.0"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Flutter APK
        run: |
          if [ -f pubspec.yaml ]; then
            echo "pubspec.yaml found. Building debug APK..."
            flutter pub get
            flutter build apk --debug
          else
            echo "WARNING: pubspec.yaml not found! Creating dummy APK for testing script configuration..."
            mkdir -p build/app/outputs/flutter-apk/
            touch build/app/outputs/flutter-apk/app-debug.apk
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & UIAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Start Appium Server
        run: |
          appium --log appium_tests/reports/appium-server.log &
        # Run Appium in the background

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r appium_tests/requirements.txt

      - name: Run Appium Tests in Android Emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          script: |
            python appium_tests/run_tests.py

      - name: Upload Test Reports & Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-test-reports
          path: appium_tests/reports/
          retention-days: 7
