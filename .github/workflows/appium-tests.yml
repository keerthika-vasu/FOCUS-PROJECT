name: Android E2E Appium Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  appium-test:
    runs-on: ubuntu-latest   # Fast start, 1:1 quota, supports KVM for Android emulator

    env:
      APPIUM_SERVER: "http://localhost:4723"
      APP_PATH: "build/app/outputs/flutter-apk/app-debug.apk"
      DEVICE_NAME: "Android Emulator"
      PLATFORM_VERSION: "10.0"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enable KVM for Android Emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Flutter APK
        run: |
          if [ -f pubspec.yaml ]; then
            echo "pubspec.yaml found. Building debug APK..."
            flutter pub get
            flutter build apk --debug
          else
            echo "WARNING: pubspec.yaml not found! Creating placeholder APK path for script testing..."
            mkdir -p build/app/outputs/flutter-apk/
            touch build/app/outputs/flutter-apk/app-debug.apk
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & UIAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Create reports directory
        run: mkdir -p appium_tests/reports/screenshots

      - name: Start Appium Server
        run: appium --log appium_tests/reports/appium-server.log &

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r appium_tests/requirements.txt

      - name: Run Appium Tests in Android Emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: python appium_tests/run_tests.py

      - name: Upload Test Reports & Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-test-reports
          path: appium_tests/reports/
          retention-days: 7

